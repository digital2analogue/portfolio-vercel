<text x="268" y="566" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="11.5" fill="#8B9683">human prose &#8212; preserved across regens</text>

<text x="620" y="622" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="12.5" fill="#A0A89A" text-anchor="middle" letter-spacing="2">released to</text>
