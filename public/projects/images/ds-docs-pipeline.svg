<text x="160" y="460" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="12" fill="#8B9683">--- front-matter: title &#183; component &#183; status &#183; a11yPattern &#183; sourceUrl ---</text>
