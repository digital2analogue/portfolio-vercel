<text x="216" y="497" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="12.5" fill="#C8CFC4">Properties &#183; Design tokens &#183; Accessibility &#183; Examples &#183; Guardrails</text>
<text x="216" y="514" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="11.5" fill="#8B9683">regenerated every run &#8212; never hand-edited</text>
