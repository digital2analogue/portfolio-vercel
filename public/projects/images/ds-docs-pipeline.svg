<rect x="180" y="645" width="440" height="92" rx="12" fill="#161C16" stroke="#4ADE6E" stroke-width="1.8"/>
<text x="206" y="685" font-size="16" font-weight="500" fill="#4ADE6E">CI freshness gate</text>
<text x="206" y="710" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="12.5" fill="#8B9683">regenerate + git diff &#8212; a stale doc can't merge</text>

<!-- Host (planned) -->
<rect x="640" y="645" width="440" height="92" rx="12" fill="#0E120D" stroke="#FCD34D" stroke-width="1.4" stroke-dasharray="5 4" opacity="0.9"/>
