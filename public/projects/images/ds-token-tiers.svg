<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="720" viewBox="0 0 1240 720" font-family="'Space Grotesk','Inter',system-ui,sans-serif">
<defs><radialGradient id="bloom" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#4ADE6E" stop-opacity="0.16"/><stop offset="1" stop-color="#4ADE6E" stop-opacity="0"/></radialGradient></defs>
<rect width="1240" height="720" fill="#0A0D0A"/>
<text x="120" y="64" font-size="33" font-weight="500" fill="#C8CFC4">Two tiers, one value</text>
<text x="120" y="94" font-size="16" font-weight="400" fill="#A0A89A">Semantic roles resolve to raw primitives. The component layer is an optional re-pointable hook &#8212; not a third set of values.</text>

<!-- Optional component hook -->
<rect x="120" y="146" width="1000" height="84" rx="12" fill="#0C100C" stroke="#2E3A2E" stroke-width="1.4" stroke-dasharray="6 4"/>
<rect x="146" y="171" width="90" height="20" rx="5" fill="none" stroke="#8B9683" stroke-width="1"/>
<text x="191" y="185" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="11" font-weight="600" fill="#A0A89A" text-anchor="middle">OPTIONAL</text>
<text x="258" y="181" font-size="16" font-weight="500" fill="#A0A89A">Component hook &#8212; a re-pointable alias, not a value</text>
<text x="258" y="205" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="13" fill="#8B9683">component.badge.success.background</text>
<text x="1096" y="192" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="12.5" fill="#8B9683" text-anchor="end">12 / 21 components</text>

<line x1="620" y1="230" x2="620" y2="277" stroke="#4ADE6E" stroke-width="2" stroke-dasharray="5 4"/>
<path d="M614.5,277 L625.5,277 L620,286 Z" fill="#4ADE6E"/>
<text x="642" y="262" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="12" fill="#8B9683">points at</text>

<!-- Tier 01 Semantic (solid) -->
<rect x="120" y="286" width="1000" height="90" rx="12" fill="#0E120D" stroke="#1A211A" stroke-width="1.4"/>
<text x="146" y="328" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="14" font-weight="600" fill="#4ADE6E">01</text>
<text x="184" y="328" font-size="16.5" font-weight="500" fill="#C8CFC4">Semantic tokens &#8212; the named roles UI writes against</text>
<text x="184" y="354" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="13" fill="#8B9683">background.success-alt</text>
<text x="1096" y="354" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="12.5" fill="#8B9683" text-anchor="end">9 / 21 reference this directly</text>

<line x1="620" y1="376" x2="620" y2="423" stroke="#4ADE6E" stroke-width="2"/>
<path d="M614.5,423 L625.5,423 L620,432 Z" fill="#4ADE6E"/>
<text x="642" y="408" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="12" fill="#8B9683">resolves to</text>

<!-- Tier 02 Primitive (solid, highlighted) -->
<ellipse cx="620" cy="477" rx="300" ry="66" fill="url(#bloom)"/>
<rect x="120" y="432" width="1000" height="90" rx="12" fill="#11160F" stroke="#2E3A2E" stroke-width="1.5"/>
<text x="146" y="474" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="14" font-weight="600" fill="#8B9683">02</text>
<text x="184" y="474" font-size="16.5" font-weight="500" fill="#A0A89A">Primitives &#8212; raw values, never referenced in UI</text>
<text x="184" y="500" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="13"><tspan fill="#8B9683">color.green.chip</tspan><tspan fill="#8B9683">&#8195;&#8594;&#8195;</tspan><tspan fill="#C8CFC4">#0F2016</tspan></text>
<rect x="406" y="489" width="18" height="15" rx="3" fill="#0F2016" stroke="#2E3A2E" stroke-width="1"/>

<line x1="620" y1="522" x2="620" y2="567" stroke="#4ADE6E" stroke-width="2"/>
<path d="M614.5,567 L625.5,567 L620,576 Z" fill="#4ADE6E"/>
<text x="642" y="553" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="12" fill="#8B9683">renders as</text>

<!-- rendered success badge -->
<rect x="556" y="586" width="128" height="30" rx="15" fill="#0F2016"/>
<circle cx="584" cy="601" r="4" fill="#4ADE6E"/>
<text x="600" y="606" font-size="14" font-weight="500" fill="#4ADE6E">Active</text>

<!-- guardrail -->
<text x="120" y="684" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="13" fill="#8B9683">UI references <tspan fill="#C8CFC4">semantic</tspan> roles, never <tspan fill="#FCD34D">--primitive-*</tspan>. The component hook is optional &#8212; it just re-points a semantic role per brand.</text>
</svg>
