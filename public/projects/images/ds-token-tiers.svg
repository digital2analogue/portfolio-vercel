<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="620" viewBox="0 0 1240 620" font-family="'Space Grotesk','Inter',system-ui,sans-serif">
<defs><radialGradient id="bloom" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#4ADE6E" stop-opacity="0.16"/><stop offset="1" stop-color="#4ADE6E" stop-opacity="0"/></radialGradient></defs>
<rect width="1240" height="620" fill="#0A0D0A"/>
<text x="120" y="64" font-size="33" font-weight="500" fill="#C8CFC4">Two tiers, one value</text>
<text x="120" y="94" font-size="16" font-weight="400" fill="#A0A89A">UI writes against named semantic roles. Each role resolves to exactly one raw primitive &#8212; no third set of values in between.</text>

<!-- Tier 01 Semantic (solid) -->
<rect x="120" y="150" width="1000" height="96" rx="12" fill="#0E120D" stroke="#1A211A" stroke-width="1.4"/>
<text x="146" y="194" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="14" font-weight="600" fill="#4ADE6E">01</text>
<text x="184" y="194" font-size="16.5" font-weight="500" fill="#C8CFC4">Semantic tokens &#8212; the named roles UI writes against</text>
<text x="184" y="222" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="13" fill="#8B9683">background.success-alt</text>
<text x="1096" y="222" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="12.5" fill="#8B9683" text-anchor="end">every component references this layer</text>

<line x1="620" y1="246" x2="620" y2="297" stroke="#4ADE6E" stroke-width="2"/>
<path d="M614.5,297 L625.5,297 L620,306 Z" fill="#4ADE6E"/>
<text x="642" y="280" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="12" fill="#8B9683">resolves to</text>

<!-- Tier 02 Primitive (solid, highlighted) -->
<ellipse cx="620" cy="352" rx="300" ry="70" fill="url(#bloom)"/>
<rect x="120" y="306" width="1000" height="96" rx="12" fill="#11160F" stroke="#2E3A2E" stroke-width="1.5"/>
<text x="146" y="350" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="14" font-weight="600" fill="#8B9683">02</text>
<text x="184" y="350" font-size="16.5" font-weight="500" fill="#A0A89A">Primitives &#8212; raw values, never referenced in UI</text>
<text x="184" y="378" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="13"><tspan fill="#8B9683">color.green.chip</tspan><tspan fill="#8B9683">&#8195;&#8594;&#8195;</tspan><tspan fill="#C8CFC4">#0F2016</tspan></text>
<rect x="406" y="367" width="18" height="15" rx="3" fill="#0F2016" stroke="#2E3A2E" stroke-width="1"/>

<line x1="620" y1="402" x2="620" y2="453" stroke="#4ADE6E" stroke-width="2"/>
<path d="M614.5,453 L625.5,453 L620,462 Z" fill="#4ADE6E"/>
<text x="642" y="436" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="12" fill="#8B9683">renders as</text>

<!-- rendered success badge -->
<rect x="556" y="472" width="128" height="30" rx="15" fill="#0F2016"/>
<circle cx="584" cy="487" r="4" fill="#4ADE6E"/>
<text x="600" y="492" font-size="14" font-weight="500" fill="#4ADE6E">Active</text>

<!-- guardrail -->
<text x="120" y="566" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace" font-size="13" fill="#8B9683">UI references <tspan fill="#C8CFC4">semantic</tspan> roles, never <tspan fill="#FCD34D">--primitive-*</tspan>. Brand overrides re-point the semantic role &#8212; the components never change.</text>
</svg>
